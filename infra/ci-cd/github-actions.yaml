name: LifeHub CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Backend
        run: docker build -f infra/Dockerfile.backend -t lifehub-backend .

      - name: Build Frontend
        run: docker build -f infra/Dockerfile.frontend -t lifehub-frontend .

      - name: Push Images
        run: |
          docker tag lifehub-backend registry.example.com/lifehub-backend:latest
          docker tag lifehub-frontend registry.example.com/lifehub-frontend:latest
          docker push registry.example.com/lifehub-backend:latest
          docker push registry.example.com/lifehub-frontend:latest

      - name: Deploy to Kubernetes
        uses: azure/k8s-deploy@v5
        with:
          manifests: |
            infra/k8s/deployment-backend.yaml
            infra/k8s/service-backend.yaml
            infra/k8s/deployment-frontend.yaml
            infra/k8s/service-frontend.yaml
            infra/k8s/ingress.yaml
